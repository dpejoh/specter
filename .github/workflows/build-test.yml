name: Build Test Module

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: src
          severity: warning

      - name: Run shell tests
        run: bash tests/run.sh

      - name: Run TS tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify module structure
        run: |
          test -f Module/module.prop
          test -f Module/META-INF/com/google/android/updater-script
          test -f Module/webroot/index.html
          test -f Module/lib/common.sh
          test -f Module/lib/constants.sh
          test -f Module/webroot/json/module_paths.json

      - name: Check no hardcoded paths
        run: |
          ! grep -rn "/data/adb/modules/Specter" Module/lib/ Module/features/ --include="*.sh"

      - name: Check no su -c in features
        run: |
          ! grep -rn "su -c" Module/features/ --include="*.sh" | grep -v "hma.sh"
          
      - name: Get module version
        id: get_name
        run: |
          VERSION=$(grep -oP '(?<=^version=).*' Module/module.prop)
          echo "artifact_name=Specter-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload ci module as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_name.outputs.artifact_name }}
          path: Module/
          retention-days: 28

      - name: Send CI build to Telegram
        if: github.event_name != 'pull_request'
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          CAPTION=$(printf '%s\n%s\n%s' "${{ steps.get_name.outputs.artifact_name }}" "$COMMIT_MSG" "${{ github.sha }}")
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"${{ steps.get_name.outputs.artifact_name }}.zip" \
            -F caption="$CAPTION" \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument")
          cat response.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Telegram send failed (HTTP $HTTP_CODE)"
            exit 1
          fi
